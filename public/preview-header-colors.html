<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Preview — Cores do Header × 6 Marcas</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f172a; font-family:'Segoe UI',Arial,sans-serif; padding:40px 32px; }

h1 { color:#94a3b8; font-size:12px; letter-spacing:4px; text-transform:uppercase; margin-bottom:40px; }

.section { margin-bottom:56px; }
.section-title { color:#38bdf8; font-size:13px; font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid rgba(148,163,184,0.15); }
.num { color:#64748b; margin-right:6px; }

.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }

.brand-block {}

.brand-label { color:#475569; font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; }

.header {
  display:flex; align-items:center; justify-content:space-between;
  height:60px; padding:0 16px;
  border-bottom:1px solid;
  border-radius:6px 6px 0 0;
}
.logo { height:40px; max-width:140px; object-fit:contain; }
.right { display:flex; align-items:center; gap:8px; }
.nome { font-size:11px; font-weight:500; }
.btn  { border:1px solid; border-radius:6px; padding:3px 10px; font-size:10px; }

.content {
  background:#162032;
  border-radius:0 0 6px 6px;
  padding:10px 16px;
  display:flex; gap:8px;
}
.card { background:#1e293b; border-radius:6px; padding:10px 12px; flex:1; }
.tag  { background:rgba(91,184,193,0.2); color:#5bb8c1; font-size:9px; font-weight:700; padding:2px 6px; border-radius:100px; display:inline-block; margin-bottom:5px; }
.ct   { color:#e2e8f0; font-size:10px; font-weight:600; }
.cb   { color:#475569; font-size:9px; margin-top:2px; }

/* ===== OPÇÃO 1 — Branco shimmer ===== */
.h1 { background:linear-gradient(135deg,#ffffff 0%,#f0f6ff 50%,#ffffff 100%); border-color:#dbeafe; box-shadow:0 2px 10px rgba(147,197,253,0.3),inset 0 1px 0 rgba(255,255,255,0.9); }
.h1 .nome { color:#1e293b; }
.h1 .btn  { border-color:#bfdbfe; color:#3b82f6; background:rgba(219,234,254,0.4); }

/* ===== OPÇÃO 2 — Branco puro ===== */
.h2 { background:#ffffff; border-color:#e2e8f0; box-shadow:0 1px 4px rgba(0,0,0,0.10); }
.h2 .nome { color:#1e293b; }
.h2 .btn  { border-color:#cbd5e1; color:#475569; }

/* ===== OPÇÃO 3 — Cinza azulado suave ===== */
.h3 { background:#e8edf5; border-color:#c8d2e0; }
.h3 .nome { color:#1e293b; }
.h3 .btn  { border-color:#b0bec5; color:#475569; }

/* ===== OPÇÃO 4 — Cinza médio atual ===== */
.h4 { background:#94a3b8; border-color:#7f8ea3; }
.h4 .nome { color:#1e293b; }
.h4 .btn  { border-color:#64748b; color:#1e293b; }

/* ===== OPÇÃO 5 — Glassmorphism escuro ===== */
.h5 { background:linear-gradient(135deg,rgba(30,41,59,0.9) 0%,rgba(15,23,42,0.95) 100%); border-color:rgba(148,163,184,0.2); box-shadow:0 2px 12px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.05); }
.h5 .nome { color:#f1f5f9; }
.h5 .btn  { border-color:rgba(148,163,184,0.35); color:#94a3b8; }
</style>
</head>
<body>
<h1>Preview — 5 opções de cor × 6 marcas</h1>

<script>
const MARCAS = [
  { slug:'apogeu',          file:'apogeu',    nome:'Aluno Apogeu' },
  { slug:'matriz-educacao', file:'matriz',    nome:'Aluno Matriz' },
  { slug:'qi-bilingue',     file:'qi',        nome:'Aluno QI' },
  { slug:'uniao',           file:'uniao',     nome:'Aluno União' },
  { slug:'unificado',       file:'unificado', nome:'Aluno Unificado' },
  { slug:'americano',       file:'americano', nome:'Aluno Americano' },
];

const OPCOES = [
  { num:1, label:'Branco com brilho azulado (shimmer)', cls:'h1' },
  { num:2, label:'Branco puro + sombra',                cls:'h2' },
  { num:3, label:'Cinza azulado suave (#e8edf5)',        cls:'h3' },
  { num:4, label:'Cinza médio atual (#94a3b8)',          cls:'h4' },
  { num:5, label:'Vidro escuro / glassmorphism',         cls:'h5' },
];

const card = () => `
  <div class="card"><div class="tag">OBMEP</div><div class="ct">Preparação OBMEP 2026</div><div class="cb">2026 · 1 aula</div></div>
  <div class="card"><div class="tag">OBA</div><div class="ct">Astronomia para a OBA</div><div class="cb">2026 · 2 aulas</div></div>
`;

const logoH = (slug) => slug === 'uniao' ? '32px' : '40px';

let html = '';
for (const op of OPCOES) {
  html += `<div class="section">
    <div class="section-title"><span class="num">${op.num}</span>${op.label}</div>
    <div class="grid">`;
  for (const m of MARCAS) {
    html += `
      <div class="brand-block">
        <div class="brand-label">${m.slug}</div>
        <div class="header ${op.cls}">
          <img class="logo" src="/marcas/${m.file}.png" style="height:${logoH(m.slug)}" alt="${m.slug}">
          <div class="right">
            <span class="nome">${m.nome}</span>
            <button class="btn">Sair</button>
          </div>
        </div>
        <div class="content">${card()}</div>
      </div>`;
  }
  html += `</div></div>`;
}
document.write(html);
</script>
</body>
</html>
